<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, label { font-family: 'Syne', sans-serif; }
    .grid-bg {
      background-image: linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    input[type="text"], input[type="email"], input[type="number"] {
      width: 100%;
      background: rgb(15 23 42);
      border: 1px solid rgb(51 65 85);
      color: white;
      padding: 0.65rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="number"]:focus {
      border-color: rgb(99 102 241);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
      outline: none;
    }
    input::placeholder { color: rgb(100 116 139); }
  </style>
</head>
<body class="min-h-screen bg-slate-950 grid-bg flex items-center justify-center px-4">

  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-indigo-600/20 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-lg">
    <div class="bg-slate-900 border border-slate-700/60 rounded-2xl shadow-2xl p-8">

      <!-- Header -->
      <div class="mb-8">
        <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center mb-4">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <h2 class="text-2xl font-800 text-white tracking-tight">Student Details</h2>
        <p class="text-slate-400 text-sm mt-1">Fill in the information below</p>
      </div>

      <!-- Form -->
      <form method="POST" class="space-y-5">
        {% csrf_token %}

        {% for field in form %}
        <div>
          <label class="block text-xs font-600 text-slate-300 uppercase tracking-widest mb-2">
            {{ field.label }}
          </label>
          {{ field }}
          {% if field.errors %}
            {% for error in field.errors %}
              <p class="mt-1 text-xs text-red-400">{{ error }}</p>
            {% endfor %}
          {% endif %}
        </div>
        {% endfor %}

        <div class="flex gap-3 pt-2">
          <button type="submit"
            class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-600 py-3 px-4 rounded-xl transition-all duration-200 text-sm tracking-wide shadow-lg shadow-indigo-600/30">
            Save Student →
          </button>
          <a href="/myapp/students/"
            class="px-5 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 rounded-xl text-sm font-500 transition-colors text-center">
            Cancel
          </a>
        </div>
      </form>

    </div>
  </div>

</body>
</html>
