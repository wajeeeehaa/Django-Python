<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white">

  <!-- Navbar -->
  <nav class="border-b border-slate-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <span class="font-700 text-white text-lg" style="font-family:'Syne',sans-serif;">StudentMS</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-slate-400 text-sm">👋 Hello, <span class="text-white font-500">{{ request.user.username }}</span></span>
      <a href="/logout/"
        class="text-sm bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-4 py-2 rounded-lg transition-colors">
        Logout
      </a>
    </div>
  </nav>

  <!-- Main -->
  <main class="max-w-4xl mx-auto px-6 py-16">
    <div class="mb-12">
      <h1 class="text-4xl font-800 text-white mb-3">Dashboard</h1>
      <p class="text-slate-400">Manage your students from here.</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-8 flex items-center justify-between">
      <div>
        <p class="text-slate-400 text-sm uppercase tracking-widest font-600 mb-1" style="font-family:'Syne',sans-serif;">Students</p>
        <h2 class="text-2xl font-700 text-white">View & Manage</h2>
        <p class="text-slate-500 text-sm mt-1">Add, edit or remove student records</p>
      </div>
      <a href="/myapp/students/"
        class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl text-sm font-600 transition-all shadow-lg shadow-indigo-600/30">
        Go to Students →
      </a>
    </div>
  </main>

</body>
</html>
