<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Catalog - TheOneAcademy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }
    .grid-bg {
      background-image: linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 grid-bg py-10 px-4">

  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-5xl mx-auto space-y-8">

    <div class="text-center mb-12">
      <h2 class="text-3xl font-800 text-white tracking-tight mb-3">Course Catalog</h2>
      <p class="text-slate-400">Expand your knowledge. Select a course to begin.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      
      {% for course in courses %}
      <div class="bg-slate-900 border border-slate-700/60 rounded-2xl shadow-xl p-6 flex flex-col h-full transition-transform hover:-translate-y-1 hover:border-indigo-500/50">
        
        <div class="flex-grow">
          <div class="w-12 h-12 rounded-xl bg-indigo-600/20 flex items-center justify-center mb-4 border border-indigo-500/30">
            <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
          </div>
          <h3 class="text-xl font-800 text-white mb-2">{{ course.title }}</h3>
          <p class="text-slate-400 text-sm leading-relaxed mb-6">{{ course.description }}</p>
        </div>

        <form action="{% url 'enroll_course' course.id %}" method="POST" class="mt-auto">
          {% csrf_token %}
          <button type="submit" class="w-full bg-slate-800 hover:bg-indigo-600 text-white font-600 py-3 px-4 rounded-xl transition-all duration-200 text-sm tracking-wide border border-slate-700 hover:border-transparent">
            Enroll Now →
          </button>
        </form>

      </div>
      {% empty %}
      <div class="col-span-full text-center py-12">
        <p class="text-slate-400">No courses available at the moment. Check back soon!</p>
      </div>
      {% endfor %}

    </div>
  </div>

</body>
</html>
