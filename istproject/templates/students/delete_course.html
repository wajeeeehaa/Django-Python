<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delete Course - TheOneAcademy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }
    .grid-bg {
      background-image: linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 grid-bg py-10 px-4 flex items-center justify-center">

  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-red-600/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md">

    <div class="bg-slate-900 border border-slate-700/60 rounded-2xl shadow-2xl p-8">

      <div class="mb-6">
        <div class="w-12 h-12 rounded-xl bg-red-600/20 flex items-center justify-center mb-4 border border-red-500/30">
          <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4v2m0 0v2m0-2v-2m0 0v-2m0 2a2 2 0 100-4 2 2 0 000 4zM3 12a9 9 0 1118 0 9 9 0 01-18 0z" />
          </svg>
        </div>
        <h2 class="text-2xl font-800 text-white tracking-tight">Delete Course?</h2>
        <p class="text-slate-400 text-sm mt-2">This action cannot be undone.</p>
      </div>

      <!-- Course Info -->
      <div class="bg-slate-800/50 border border-slate-700 rounded-lg p-4 mb-6">
        <p class="text-xs font-600 text-slate-400 uppercase tracking-widest mb-2">Course to Delete</p>
        <h3 class="text-lg font-700 text-white mb-1">{{ course.title }}</h3>
        <p class="text-sm text-slate-300 line-clamp-2">{{ course.description }}</p>
      </div>

      <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        <button
          type="submit"
          class="w-full bg-red-600 hover:bg-red-500 text-white font-600 py-3 px-4 rounded-lg transition-all shadow-lg shadow-red-600/20"
        >
          Yes, Delete Course
        </button>
        
        <a
          href="{% url 'manage_courses' %}"
          class="block w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-600 py-3 px-4 rounded-lg transition-all text-center border border-slate-700"
        >
          Cancel
        </a>
      </form>

    </div>

  </div>

</body>
</html>
